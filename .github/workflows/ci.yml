name: CI

on:
  push:
    branches: [main, mini-test]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-and-build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20.16.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck libs
        run: pnpm run typecheck:libs

      - name: Typecheck full workspace
        run: pnpm run typecheck

      - name: Build all packages
        run: pnpm run build

  oracle-tests:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.16.0'
          cache: 'npm'
          cache-dependency-path: oracle/package.json

      - name: Install oracle dependencies
        working-directory: oracle
        run: npm install

      - name: Run oracle test suite
        working-directory: oracle
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: oracle-coverage
          path: oracle/coverage/
          retention-days: 14

  format-check:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20.16.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: npx prettier --check .
