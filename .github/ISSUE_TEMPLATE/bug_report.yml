name: Bug Report
description: Report a bug in the contract, oracle, API server, or dashboard
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: layer
    attributes:
      label: Affected layer
      options:
        - Smart contract (programs/project_mappers)
        - Oracle middleware
        - API server
        - Dashboard
        - SDK
        - Other / not sure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: false
  - type: input
    id: tx-sig
    attributes:
      label: Transaction signature (if on-chain related)
      placeholder: "5Kt..."
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      render: shell
    validations:
      required: false
